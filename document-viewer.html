<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Viewer Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            color: #2c3e50;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 14px;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        .sidebar {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 80vh;
            position: sticky;
            top: 20px;
            animation: slideUp 0.5s ease-out;
        }

        .content-area {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== SIDEBAR ===== */
        .sidebar-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-bottom: 1px solid #e0e6ed;
        }

        .sidebar-header h2 {
            font-size: 16px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .search-box {
            display: flex;
            gap: 8px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 13px;
            transition: all 0.3s;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .search-box input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
        }

        .filter-section {
            padding: 16px;
            border-bottom: 1px solid #e0e6ed;
            flex-shrink: 0;
        }

        .filter-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: #7f8c8d;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }

        .filter-select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e0e6ed;
            border-radius: 6px;
            font-size: 12px;
            color: #333;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-select:hover {
            border-color: #667eea;
        }

        .filter-select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .document-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .document-item {
            padding: 12px;
            margin-bottom: 6px;
            background: #f8f9fb;
            border-left: 3px solid #667eea;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e0e6ed;
        }

        .document-item:hover {
            background: #eef0fb;
            transform: translateX(4px);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.15);
        }

        .document-item.active {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-left-color: #667eea;
            border-color: #667eea;
            font-weight: 500;
        }

        .document-name {
            font-size: 12px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .document-meta {
            font-size: 10px;
            color: #95a5a6;
            display: flex;
            gap: 8px;
        }

        /* ===== CONTENT AREA ===== */
        .content-header {
            background: linear-gradient(135deg, #f8f9fb 0%, #f3f4f7 100%);
            padding: 20px;
            border-bottom: 1px solid #e0e6ed;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-title {
            flex: 1;
        }

        .content-title h3 {
            font-size: 18px;
            color: #2c3e50;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .content-subtitle {
            font-size: 12px;
            color: #7f8c8d;
        }

        .content-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 8px 12px;
            background: white;
            border: 1px solid #e0e6ed;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: #7f8c8d;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #f8f9fb;
            border-color: #667eea;
            color: #667eea;
        }

        .content-body {
            flex: 1;
            overflow: auto;
            display: flex;
        }

        .document-preview {
            flex: 1;
            padding: 30px;
            background: white;
            line-height: 1.8;
            font-size: 14px;
            color: #333;
        }

        .document-preview h2 {
            color: #2c3e50;
            font-size: 20px;
            margin: 20px 0 12px 0;
            font-weight: 600;
            border-bottom: 2px solid #667eea;
            padding-bottom: 8px;
        }

        .document-preview h3 {
            color: #2c3e50;
            font-size: 16px;
            margin: 16px 0 8px 0;
            font-weight: 600;
        }

        .document-preview p {
            margin-bottom: 12px;
            color: #555;
        }

        .document-preview ul,
        .document-preview ol {
            margin-left: 20px;
            margin-bottom: 12px;
        }

        .document-preview li {
            margin-bottom: 6px;
        }

        .metadata-panel {
            width: 280px;
            background: linear-gradient(135deg, #f8f9fb 0%, #f3f4f7 100%);
            border-left: 1px solid #e0e6ed;
            padding: 20px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .metadata-section {
            margin-bottom: 20px;
        }

        .metadata-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: #7f8c8d;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .metadata-value {
            font-size: 12px;
            color: #2c3e50;
            font-weight: 500;
            word-break: break-word;
        }

        .tag {
            display: inline-block;
            padding: 4px 8px;
            background: white;
            border: 1px solid #e0e6ed;
            border-radius: 4px;
            font-size: 11px;
            color: #667eea;
            margin-bottom: 6px;
            margin-right: 6px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            color: #95a5a6;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 14px;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        @media (max-width: 1200px) {
            .main-layout {
                grid-template-columns: 300px 1fr;
            }

            .metadata-panel {
                width: 240px;
            }
        }

        @media (max-width: 900px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                max-height: 300px;
                position: static;
            }

            .content-body {
                flex-direction: column;
            }

            .metadata-panel {
                width: 100%;
                border-left: none;
                border-top: 1px solid #e0e6ed;
            }

            .document-preview {
                padding: 20px;
            }
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 24px;
            }

            .content-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .content-actions {
                width: 100%;
            }

            .action-btn {
                flex: 1;
            }

            .search-box {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Document Viewer</h1>
            <p>Browse and analyze your documents with metadata</p>
        </div>

        <div class="main-layout">
            <!-- SIDEBAR: Document List -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <h2>Documents</h2>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Search documents...">
                    </div>
                </div>

                <div class="filter-section">
                    <label class="filter-label">Filter by Type</label>
                    <select class="filter-select" id="typeFilter" onchange="filterDocuments()">
                        <option value="">All Types</option>
                        <option value="Report">Report</option>
                        <option value="Proposal">Proposal</option>
                        <option value="Analysis">Analysis</option>
                        <option value="Manual">Manual</option>
                        <option value="Brief">Brief</option>
                    </select>
                </div>

                <div class="document-list scrollbar-hide" id="documentList">
                    <!-- Documents will be populated here -->
                </div>
            </div>

            <!-- CONTENT AREA -->
            <div class="content-area">
                <div class="content-header">
                    <div class="content-title">
                        <h3 id="docTitle">Select a document to view</h3>
                        <div class="content-subtitle" id="docSubtitle"></div>
                    </div>
                    <div class="content-actions">
                        <button class="action-btn" onclick="copyToClipboard()">Copy Text</button>
                        <button class="action-btn" onclick="downloadDocument()">Download</button>
                    </div>
                </div>

                <div class="content-body">
                    <div class="document-preview scrollbar-hide" id="documentPreview">
                        <div class="empty-state">
                            <div class="empty-state-icon">📄</div>
                            <div class="empty-state-text">Select a document from the list to view its content</div>
                        </div>
                    </div>
                    <div class="metadata-panel scrollbar-hide" id="metadataPanel">
                        <!-- Metadata will be populated here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // EMBEDDED DOCUMENTS DATA - Replace with your actual documents
        // ============================================================
        const documentsData = [
            {
                id: 1,
                name: "Project Charter",
                type: "Proposal",
                source: "project_charter.pdf",
                date: "2024-01-15",
                author: "John Smith",
                tags: ["Strategic", "Q1", "Initiative"],
                content: `
                    <h2>Project Charter</h2>
                    <h3>Executive Summary</h3>
                    <p>This document outlines the charter for the strategic initiative project. The project aims to enhance operational efficiency and improve customer engagement through digital transformation.</p>
                    
                    <h3>Project Objectives</h3>
                    <ul>
                        <li>Implement new digital infrastructure</li>
                        <li>Reduce operational costs by 20%</li>
                        <li>Improve customer satisfaction scores</li>
                        <li>Enable data-driven decision making</li>
                    </ul>

                    <h3>Scope</h3>
                    <p>The project will cover all business units and is expected to run for 18 months with quarterly milestones.</p>

                    <h3>Key Stakeholders</h3>
                    <p>Executive leadership, department heads, IT team, and external consultants.</p>
                `
            },
            {
                id: 2,
                name: "Technical Analysis Report",
                type: "Analysis",
                source: "tech_analysis.pdf",
                date: "2024-02-20",
                author: "Sarah Johnson",
                tags: ["Technical", "Infrastructure", "Q1"],
                content: `
                    <h2>Technical Analysis Report</h2>
                    <h3>Current State Assessment</h3>
                    <p>Our technical infrastructure evaluation reveals several areas for improvement and modernization. The existing systems are functional but lack scalability for future growth.</p>

                    <h3>Key Findings</h3>
                    <ul>
                        <li>Legacy systems account for 40% of technical debt</li>
                        <li>Cloud migration could reduce costs by 30%</li>
                        <li>Security compliance gaps identified in 3 areas</li>
                        <li>API architecture needs modernization</li>
                    </ul>

                    <h3>Recommendations</h3>
                    <p>Prioritize cloud migration, implement modern API standards, and establish a security governance framework.</p>
                `
            },
            {
                id: 3,
                name: "Business Strategy Brief",
                type: "Brief",
                source: "strategy_brief.pdf",
                date: "2024-02-10",
                author: "Michael Chen",
                tags: ["Strategy", "Market", "Growth"],
                content: `
                    <h2>Business Strategy Brief</h2>
                    <h3>Market Overview</h3>
                    <p>The current market landscape presents significant opportunities for expansion and diversification. Our competitive positioning is strong, but we need to act strategically.</p>

                    <h3>Strategic Priorities</h3>
                    <ul>
                        <li>Expand into emerging markets</li>
                        <li>Strengthen customer retention programs</li>
                        <li>Invest in innovation and R&D</li>
                        <li>Build strategic partnerships</li>
                    </ul>

                    <h3>Financial Impact</h3>
                    <p>Expected revenue growth of 25% over the next three years with improved margins.</p>
                `
            },
            {
                id: 4,
                name: "Implementation Manual",
                type: "Manual",
                source: "implementation_manual.pdf",
                date: "2024-01-30",
                author: "Emily Davis",
                tags: ["Operations", "Procedure", "Training"],
                content: `
                    <h2>Implementation Manual</h2>
                    <h3>Getting Started</h3>
                    <p>This manual provides step-by-step guidance for implementing the new system across all departments.</p>

                    <h3>Phase 1: Preparation</h3>
                    <ul>
                        <li>Conduct staff training sessions</li>
                        <li>Prepare data for migration</li>
                        <li>Set up test environment</li>
                        <li>Create backup procedures</li>
                    </ul>

                    <h3>Phase 2: Deployment</h3>
                    <p>Roll out will follow a phased approach with parallel systems running for 2 weeks.</p>
                `
            },
            {
                id: 5,
                name: "Market Research Report",
                type: "Report",
                source: "market_research.pdf",
                date: "2024-02-28",
                author: "Lisa Anderson",
                tags: ["Market", "Research", "Insights"],
                content: `
                    <h2>Market Research Report</h2>
                    <h3>Research Methodology</h3>
                    <p>We conducted comprehensive market research including surveys, interviews, and competitive analysis across three major segments.</p>

                    <h3>Key Insights</h3>
                    <ul>
                        <li>Customer preferences shifting towards digital solutions</li>
                        <li>Competitor analysis shows gap in service quality</li>
                        <li>Market growth rate: 15% annually</li>
                        <li>High demand for integrated platforms</li>
                    </ul>

                    <h3>Recommendations</h3>
                    <p>Develop integrated platform offering and focus on customer experience optimization.</p>
                `
            }
        ];

        let currentDocument = null;
        let filteredDocuments = [...documentsData];

        // Initialize on page load
        window.addEventListener('load', () => {
            renderDocumentList();
            document.getElementById('searchInput').addEventListener('keyup', searchDocuments);
        });

        function renderDocumentList() {
            const list = document.getElementById('documentList');
            list.innerHTML = '';

            filteredDocuments.forEach(doc => {
                const item = document.createElement('div');
                item.className = 'document-item' + (currentDocument?.id === doc.id ? ' active' : '');
                item.onclick = () => viewDocument(doc);
                
                item.innerHTML = `
                    <div class="document-name">${doc.name}</div>
                    <div class="document-meta">
                        <span>${doc.type}</span>
                        <span>${formatDate(doc.date)}</span>
                    </div>
                `;
                
                list.appendChild(item);
            });

            if (filteredDocuments.length === 0) {
                list.innerHTML = '<div style="padding: 20px; text-align: center; color: #95a5a6; font-size: 12px;">No documents found</div>';
            }
        }

        function viewDocument(doc) {
            currentDocument = doc;
            
            // Update header
            document.getElementById('docTitle').textContent = doc.name;
            document.getElementById('docSubtitle').textContent = `${doc.type} • ${doc.author} • ${formatDate(doc.date)}`;
            
            // Update content
            document.getElementById('documentPreview').innerHTML = doc.content;
            
            // Update metadata
            updateMetadata(doc);
            
            // Update active state
            renderDocumentList();
        }

        function updateMetadata(doc) {
            const panel = document.getElementById('metadataPanel');
            
            let tagsHtml = doc.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
            
            panel.innerHTML = `
                <div class="metadata-section">
                    <div class="metadata-label">Document Type</div>
                    <div class="metadata-value">${doc.type}</div>
                </div>
                <div class="metadata-section">
                    <div class="metadata-label">Author</div>
                    <div class="metadata-value">${doc.author}</div>
                </div>
                <div class="metadata-section">
                    <div class="metadata-label">Date</div>
                    <div class="metadata-value">${formatDate(doc.date)}</div>
                </div>
                <div class="metadata-section">
                    <div class="metadata-label">Source</div>
                    <div class="metadata-value">${doc.source}</div>
                </div>
                <div class="metadata-section">
                    <div class="metadata-label">Tags</div>
                    <div>${tagsHtml}</div>
                </div>
            `;
        }

        function searchDocuments() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const typeFilter = document.getElementById('typeFilter').value;
            
            filteredDocuments = documentsData.filter(doc => {
                const matchesSearch = doc.name.toLowerCase().includes(query) || 
                                    doc.author.toLowerCase().includes(query) ||
                                    doc.tags.some(tag => tag.toLowerCase().includes(query));
                const matchesType = !typeFilter || doc.type === typeFilter;
                return matchesSearch && matchesType;
            });
            
            renderDocumentList();
        }

        function filterDocuments() {
            searchDocuments();
        }

        function copyToClipboard() {
            if (!currentDocument) {
                alert('Please select a document first');
                return;
            }
            
            const text = document.getElementById('documentPreview').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('Document text copied to clipboard!');
            });
        }

        function downloadDocument() {
            if (!currentDocument) {
                alert('Please select a document first');
                return;
            }
            
            const text = document.getElementById('documentPreview').innerText;
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
            element.setAttribute('download', `${currentDocument.name.replace(/\s+/g, '_')}.txt`);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return new Date(dateString).toLocaleDateString('en-US', options);
        }
    </script>
</body>
</html>
